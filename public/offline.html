<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — Indian Caucus</title>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <style>
    :root { color-scheme: light dark; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
      background: #0f2044; color: #e6edf3;
    }
    .card { max-width: 360px; }
    img { width: 64px; height: 64px; border-radius: 16px; margin-bottom: 20px; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { color: #9fb0c9; font-size: 14px; line-height: 1.5; margin: 0 0 20px; }
    button {
      background: linear-gradient(135deg, #e85d04, #f97316); color: #fff;
      border: 0; border-radius: 12px; padding: 12px 22px; font-weight: 700; font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/apple-touch-icon.png" alt="Indian Caucus" />
    <h1>You're offline</h1>
    <p>This page needs an internet connection. Check your network and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
